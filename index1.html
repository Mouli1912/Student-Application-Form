<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <link rel="stylesheet" href="styles1.css">
</head>
<body>
    <header>
        <h1>Student Registration System</h1>
        <p>Register, edit, and manage student records effortlessly.</p>
    </header>
    <form id="studentForm">
        <input type="text" id="studentName" placeholder="Name" required />
        <input type="text" id="studentId" placeholder="ID" required />
        <input type="email" id="email" placeholder="Email" required />
        <input type="text" id="contact" placeholder="Contact" required />
        <button type="submit">Add Student</button>
    </form>

    <table id="studentsTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>ID</th>
                <th>Email</th>
                <th>Contact</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="script3.js"></script>
</body>
</html>
